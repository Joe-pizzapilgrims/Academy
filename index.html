<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pizza Pilgrims Academy</title>

<style>

:root{
    --green:#063f2c;
    --light:#b8ff9c;
    --white:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    font-family:Arial,sans-serif;
    color:var(--green);

    background:
    linear-gradient(
        rgba(255,255,255,.72),
        rgba(255,255,255,.78)
    ),
    url("background.jpg") center center / cover no-repeat fixed;
}

.wrapper{
    width:100%;
    max-width:1300px;
    margin:auto;
    padding:60px 25px;
    text-align:center;
}

.logo{
    display:block;
    width:min(340px,75%);
    margin:auto;

    opacity:0;
    transform:translateY(-20px);
    animation:fadeDown .8s ease forwards;
}

h1{
    margin-top:30px;
    color:var(--green);
    font-size:clamp(42px,6vw,72px);
    font-weight:bold;
    text-transform:uppercase;
    letter-spacing:2px;

    opacity:0;
    transform:translateY(-14px);
    animation:fadeDown .8s ease .18s forwards;
}

.subtitle{
    max-width:700px;
    margin:18px auto 60px;
    color:var(--green);
    font-size:clamp(18px,2vw,24px);
    line-height:1.5;

    opacity:0;
    transform:translateY(12px);
    animation:fadeUp .7s ease .42s forwards;
}

.buttons{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:45px;
    flex-wrap:wrap;
}

.button-link{
    display:block;
    opacity:0;
    transform:translateY(45px) scale(.96);
    animation:buttonRise .75s cubic-bezier(.2,.75,.25,1) forwards;
    transition:transform .25s ease;
}

.button-link:nth-child(1){
    animation-delay:.7s;
}

.button-link:nth-child(2){
    animation-delay:.9s;
}

.button-link:nth-child(3){
    animation-delay:1.1s;
}

.button-link:hover,
.button-link:focus-visible{
    transform:translateY(-8px) scale(1.04);
    outline:none;
}

.button-link img{
    display:block;
    width:320px;
    max-width:85vw;

    filter:drop-shadow(0 14px 18px rgba(0,0,0,.35));
    transition:filter .25s ease;
}

.button-link:hover img,
.button-link:focus-visible img{
    filter:drop-shadow(0 22px 26px rgba(0,0,0,.5));
}

.footer{
    margin-top:70px;
    color:var(--green);
    font-size:15px;
    font-weight:bold;

    opacity:0;
    transform:translateY(12px);
    animation:fadeUp .7s ease 1.35s forwards;
}

@keyframes fadeDown{
    from{
        opacity:0;
        transform:translateY(-20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(18px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes buttonRise{
    from{
        opacity:0;
        transform:translateY(45px) scale(.96);
    }

    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

@media(max-width:1100px){

    .buttons{
        gap:30px;
    }

    .button-link img{
        width:280px;
    }

}

@media(max-width:900px){

    .buttons{
        flex-direction:column;
    }

    .button-link img{
        width:min(420px,90vw);
    }

    .subtitle{
        margin-bottom:40px;
    }

}

@media(prefers-reduced-motion:reduce){

    .logo,
    h1,
    .subtitle,
    .button-link,
    .footer{
        opacity:1;
        transform:none;
        animation:none;
    }

    .button-link,
    .button-link img{
        transition:none;
    }

}

</style>

</head>

<body>

<div class="wrapper">

    <img
        src="logo.png"
        class="logo"
        alt="Pizza Pilgrims"
    >

    <h1>Pizza Pilgrims Academy</h1>

    <p class="subtitle">
        Training, development and promotion tools for Pizza Pilgrims.
    </p>

    <div class="buttons">

        <a
            class="button-link"
            href="https://joe-pizzapilgrims.github.io/DeepDives/"
        >
            <img
                src="deepdive.png"
                alt="Open Deep Dives"
            >
        </a>

        <a
            class="button-link"
            href="#"
        >
            <img
                src="development.png"
                alt="Open Development Tracker"
            >
        </a>

        <a
            class="button-link"
            href="https://joe-pizzapilgrims.github.io/PizzaPilgrimsSignOffs/"
        >
            <img
                src="signoff.png"
                alt="Open Promotion Sign-Offs"
            >
        </a>

    </div>

    <div class="footer">
        Making people happier, one pizza at a time.
    </div>

</div>

</body>

</html>
